<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Substation Analytics Live</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>
    <style>
        body { background-color: #0a0a0a; color: #ffffff; }
        .card { background-color: #1a1a1a; border: 1px solid #333; border-radius: 8px;}
        .card-header { border-bottom: 1px solid #333; font-weight: bold; color: #aaa; }
        .text-cyan { color: #00FFFF; }
        .text-gold { color: #FFD700; }
    </style>
</head>
<body>
    <div class="container-fluid mt-4">
        <h2 class="text-center text-info mb-4">⚡ AI Smart Substation Monitoring Platform (Live Demo)</h2>
        
        <div class="row mb-4">
            <div class="col-md-3">
                <div class="card text-center h-100">
                    <div class="card-header">Transformer T1 - Health Score</div>
                    <div class="card-body"><h3 id="health-score" class="text-success">87.4 / 100</h3></div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card text-center h-100">
                    <div class="card-header">Active Anomalies (24h)</div>
                    <div class="card-body"><h3 id="anomaly-count" class="text-info">0</h3></div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card text-center h-100">
                    <div class="card-header">Est. Remaining Useful Life</div>
                    <div class="card-body"><h3 id="rul" class="text-success">1,240 Days</h3></div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card text-center h-100">
                    <div class="card-header">System Status</div>
                    <div class="card-body"><h3 id="status" class="text-success">STABLE</h3></div>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-12">
                <div class="card">
                    <div class="card-header">Real-Time Telemetry (Simulated Edge Data)</div>
                    <div class="card-body">
                        <div id="telemetry-chart"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
